apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-remediator
  namespace: chatbot-remediator
  labels:
    app: chatbot-remediator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot-remediator
  template:
    metadata:
      labels:
        app: chatbot-remediator
    spec:
      containers:
      - name: chatbot-remediator
        image: relibank.azurecr.io/chatbot-remediator:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5004
          name: http
        env:
        - name: APP_NAME
          value: "ReliBank"
        - name: NEW_RELIC_APP_NAME
          value: "ReliBank - Chatbot Remediator"
        - name: NEW_RELIC_ACCOUNT_ID
          valueFrom:
            secretKeyRef:
              name: newrelic-secrets
              key: account-id
        - name: NEW_RELIC_LICENSE_KEY
          valueFrom:
            secretKeyRef:
              name: newrelic-secrets
              key: license-key
        - name: NEW_RELIC_USER_API_KEY
          valueFrom:
            secretKeyRef:
              name: newrelic-secrets
              key: user-api-key
        - name: AZURE_OPENAI_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: azure-config
              key: azure-openai-endpoint
        - name: AZURE_OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: azure-secrets
              key: azure-openai-api-key
        - name: ASSISTANT_A_ID
          valueFrom:
            configMapKeyRef:
              name: remediator-assistant-config
              key: coordinator-id
        - name: ASSISTANT_B_ID
          valueFrom:
            configMapKeyRef:
              name: remediator-assistant-config
              key: remediator-id
        - name: ASSISTANT_B_DELAY_SECONDS
          value: "0"
        - name: OPENAI_API_VERSION
          value: "2024-05-01-preview"
        - name: OPENAI_API_TYPE
          value: "azure"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /chatbot-service/health
            port: 5004
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /chatbot-service/health
            port: 5004
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: chatbot-remediator
  namespace: chatbot-remediator
  labels:
    app: chatbot-remediator
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 5004
    protocol: TCP
    name: http
  selector:
    app: chatbot-remediator
