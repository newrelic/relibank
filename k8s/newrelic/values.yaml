# New Relic Kubernetes Integration with eBPF
# Note: licenseKey is set via skaffold setValueTemplates
global:
  cluster: "relibank-dev"
  lowDataMode: true

# Enable New Relic Infrastructure
newrelic-infrastructure:
  enabled: true
  privileged: true

# Enable Kubernetes Events
nri-kube-events:
  enabled: false

# Enable Prometheus integration
nri-prometheus:
  enabled: true

# Enable Kubernetes metadata injection
nri-metadata-injection:
  enabled: true

# Enable New Relic native eBPF agent for network visibility
nr-ebpf-agent:
  enabled: true

# Disable Pixie (not needed with nr-ebpf-agent)
pixie:
  enabled: false

# Enable Logging
newrelic-logging:
  enabled: true
  lowDataMode: true

# Disable Pixie integration (not needed with nr-ebpf-agent)
newrelic-pixie:
  enabled: false

# Kubelet configuration
ksm:
  enabled: true

# Control plane monitoring
controlPlane:
  enabled: false
