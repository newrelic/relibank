# nr-k8s-otel-collector values
# global.cluster and global.licenseKey are set via skaffold setValueTemplates.
# This file overrides the chart's daemonset config so the collector also
# accepts OTLP from the in-cluster kafka and mssql collectors and forwards
# everything to New Relic. Self-telemetry block (service.telemetry.*) makes
# the collector observe itself.

kube-state-metrics:
  prometheusScrape: true

daemonset:
  configMap:
    overrideConfig:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

      processors:
        memory_limiter:
          check_interval: 1s
          limit_percentage: 80
          spike_limit_percentage: 25

        k8sattributes:
          auth_type: serviceAccount
          passthrough: false
          filter:
            node_from_env_var: KUBE_NODE_NAME
          extract:
            metadata:
              - k8s.pod.name
              - k8s.pod.uid
              - k8s.deployment.name
              - k8s.namespace.name
              - k8s.node.name
              - k8s.pod.start_time
          pod_association:
            - sources:
                - from: resource_attribute
                  name: k8s.pod.uid

        batch:
          send_batch_size: 800
          send_batch_max_size: 1000
          timeout: 30s

      exporters:
        otlphttp/newrelic:
          endpoint: https://otlp.nr-data.net
          headers:
            api-key: ${env:NR_LICENSE_KEY}

      service:
        pipelines:
          traces/otlp:
            receivers: [otlp]
            processors: [memory_limiter, k8sattributes, batch]
            exporters: [otlphttp/newrelic]
          metrics/otlp:
            receivers: [otlp]
            processors: [memory_limiter, k8sattributes, batch]
            exporters: [otlphttp/newrelic]
          logs/otlp:
            receivers: [otlp]
            processors: [memory_limiter, k8sattributes, batch]
            exporters: [otlphttp/newrelic]

        telemetry:
          metrics:
            level: "${env:INTERNAL_TELEMETRY_METRICS_LEVEL:-detailed}"
            readers:
              - periodic:
                  exporter:
                    otlp:
                      protocol: http/protobuf
                      endpoint: "${env:INTERNAL_TELEMETRY_OTLP_ENDPOINT:-https://otlp.nr-data.net}"
                      headers:
                        - name: api-key
                          value: "${env:INTERNAL_TELEMETRY_NEW_RELIC_LICENSE_KEY}"
          logs:
            level: "${env:INTERNAL_TELEMETRY_LOG_LEVEL:-INFO}"
            sampling:
              enabled: true
              tick: 10s
              initial: 10
              thereafter: 100
            processors:
              - batch:
                  exporter:
                    otlp:
                      protocol: http/protobuf
                      endpoint: "${env:INTERNAL_TELEMETRY_OTLP_ENDPOINT:-https://otlp.nr-data.net}"
                      headers:
                        - name: api-key
                          value: "${env:INTERNAL_TELEMETRY_NEW_RELIC_LICENSE_KEY}"
          traces:
            level: "${env:INTERNAL_TELEMETRY_TRACE_LEVEL:-none}"
            sampler:
              parent_based:
                root:
                  trace_id_ratio_based:
                    ratio: ${env:INTERNAL_TELEMETRY_TRACE_SAMPLE_RATIO:-0.01}
            processors:
              - batch:
                  exporter:
                    otlp:
                      protocol: http/protobuf
                      endpoint: "${env:INTERNAL_TELEMETRY_OTLP_ENDPOINT:-https://otlp.nr-data.net}"
                      headers:
                        - name: api-key
                          value: "${env:INTERNAL_TELEMETRY_NEW_RELIC_LICENSE_KEY}"
          resource:
            newrelic.collector_telemetry.version: 0.4.0
            newrelic.service.type: otel_collector
            service.name: "${env:INTERNAL_TELEMETRY_SERVICE_NAME:-otel-collector}"
            k8s.cluster.name: "${env:K8S_CLUSTER_NAME}"
            k8s.namespace.name: "${env:K8S_NAMESPACE_NAME}"
            k8s.pod.name: "${env:K8S_POD_NAME}"
            k8s.node.name: "${env:K8S_NODE_NAME}"
            k8s.container.name: "${env:K8S_CONTAINER_NAME}"

  envs:
    - name: INTERNAL_TELEMETRY_NEW_RELIC_LICENSE_KEY
      valueFrom:
        secretKeyRef:
          name: nrdot-mssql-credentials
          key: NEW_RELIC_LICENSE_KEY
    - name: INTERNAL_TELEMETRY_SERVICE_NAME
      value: relibank-nrdot-collector
    - name: INTERNAL_TELEMETRY_OTLP_ENDPOINT
      value: https://otlp.nr-data.net
    - name: INTERNAL_TELEMETRY_TRACE_LEVEL
      value: basic
    - name: INTERNAL_TELEMETRY_TRACE_SAMPLE_RATIO
      value: "0.001"
    - name: K8S_CLUSTER_NAME
      value: relibank-dev
    - name: K8S_NAMESPACE_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: K8S_POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: K8S_CONTAINER_NAME
      value: opentelemetry-collector
