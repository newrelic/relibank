apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - scenario-runner-rbac.yaml
  - relibank-ingress.yaml

patches:
  - path: persistentvolumeclaim-patch.yaml

# Generate ConfigMap and Secret from literals (values come from environment variables)
configMapGenerator:
  - name: azure-assistant-config
    namespace: relibank
    literals:
      - assistant-a-id=${ASSISTANT_A_ID}
      - assistant-b-id=${ASSISTANT_B_ID}
    behavior: replace

secretGenerator:
  - name: azure-openai-secrets
    namespace: relibank
    literals:
      - endpoint=${AZURE_OPENAI_ENDPOINT}
      - api-key=${AZURE_OPENAI_API_KEY}
    type: Opaque
    behavior: replace

images:
- name: accounts-service
  newTag: latest
- name: transaction-service
  newTag: latest
- name: bill-pay-service
  newTag: latest
- name: notifications-service
  newTag: latest
- name: scheduler-service
  newTag: latest
- name: scenario-runner-service
  newTag: latest
- name: chatbot-service
  newTag: latest
- name: postgres-custom
  newTag: latest
- name: mssql-custom
  newTag: latest
- name: kafka-with-monitoring
  newTag: latest
