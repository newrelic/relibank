apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: chatbot-service
  name: chatbot-service
  namespace: relibank
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot-service
  template:
    metadata:
      labels:
        app: chatbot-service
    spec:
      containers:
        - env:
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef:
                  key: KAFKA_BROKER
                  name: infrastructure-config
            # Azure OpenAI Assistants configuration
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: azure-openai-secrets
                  key: endpoint
                  optional: true
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: azure-openai-secrets
                  key: api-key
                  optional: true
            - name: ASSISTANT_A_ID
              valueFrom:
                configMapKeyRef:
                  name: azure-assistant-config
                  key: assistant-a-id
                  optional: true
            - name: ASSISTANT_B_ID
              valueFrom:
                configMapKeyRef:
                  name: azure-assistant-config
                  key: assistant-b-id
                  optional: true
            # Demo: Artificial delay for Assistant B (set to 5-10 for demo)
            - name: ASSISTANT_B_DELAY_SECONDS
              value: "0"
          image: chatbot-service
          name: chatbot-service
          ports:
            - containerPort: 5003
              protocol: TCP
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: chatbot-service
  name: chatbot-service
  namespace: relibank
spec:
  ports:
  - name: "5003"
    port: 5003
    targetPort: 5003
  selector:
    app: chatbot-service
