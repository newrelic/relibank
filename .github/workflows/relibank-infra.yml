name: ReliBank Infra

run-name: ${{ inputs.action_type }} ReliBank Infra in ${{ inputs.environment }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      action_type:
        description: "deploy | destroy"
        type: choice
        required: true
        default: "deploy"
        options:
          - deploy
          - destroy
      environment:
        description: "Select environment"
        type: choice
        required: true
        default: "sandbox"
        options:
          - sandbox
          - staging
          - prod
          - analysts
      stage:
        description: "Which stage(s) to apply (deploy only; ignored on destroy). Use ai_services or notifications to skip cluster + infra and just rebuild that piece."
        type: choice
        required: true
        default: "all"
        options:
          - all
          - ai_services
          - notifications

jobs:

  # ---------------------------------------------------------------------------
  # Pre-destroy safety check — refuse destroy if app deployments are still up
  # ---------------------------------------------------------------------------
  pre-destroy-checks:
    name: Pre-Destroy Checks
    if: ${{ github.event.inputs.action_type == 'destroy' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    outputs:
      safe_to_destroy: ${{ steps.check.outputs.safe_to_destroy }}

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure kubectl
        run: |
          az aks get-credentials \
            --resource-group ${{ vars.AKS_RESOURCE_GROUP }} \
            --name           ${{ vars.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Check for running app deployments
        id: check
        run: |
          BLUE=$(kubectl get deployments -n relibank-blue  --no-headers --ignore-not-found 2>/dev/null | wc -l | tr -d ' ')
          GREEN=$(kubectl get deployments -n relibank-green --no-headers --ignore-not-found 2>/dev/null | wc -l | tr -d ' ')
          echo "Found blue=$BLUE green=$GREEN deployments"
          if [[ "$BLUE" -gt 0 || "$GREEN" -gt 0 ]]; then
            echo "App deployments still running. Run 'Deploy ReliBank' destroy first."
            echo "safe_to_destroy=false" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "No app deployments found. Safe to destroy infra."
            echo "safe_to_destroy=true" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Deploy — Stage 1 cluster, Stage 2 cluster-wide infra components
  # ---------------------------------------------------------------------------
  relibank-infra-deploy:
    name: Deploy ReliBank Infra
    if: ${{ github.event.inputs.action_type == 'deploy' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ github.event.inputs.environment }}
    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5

      # ------------------------------------------------------------------
      # Stage 1 — AKS cluster (mirrors demogorgon init/)
      # ------------------------------------------------------------------
      - name: "Terraform Init (Stage 1 cluster)"
        if: ${{ github.event.inputs.stage == 'all' }}
        working-directory: terraform/aks/cluster
        run: |
          terraform init \
            --backend-config="resource_group_name=ReliBank" \
            --backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            --backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            --backend-config="key=relibank/${{ github.event.inputs.environment }}/cluster.tfstate" \
            --reconfigure --upgrade

      - name: "Terraform Apply (Stage 1 cluster)"
        if: ${{ github.event.inputs.stage == 'all' }}
        working-directory: terraform/aks/cluster
        run: |
          terraform apply \
            -var="demo_environment=${{ github.event.inputs.environment }}" \
            -var="aks_cluster_name=${{ vars.AKS_CLUSTER_NAME }}" \
            -var="resource_group_name=${{ vars.AKS_RESOURCE_GROUP }}" \
            -var="acr_name=${{ vars.ACR_NAME }}" \
            -var="location=${{ vars.AZURE_LOCATION }}" \
            --auto-approve

      # ------------------------------------------------------------------
      # Stage 2 — cluster-wide infra (mirrors demogorgon infra/)
      # ------------------------------------------------------------------
      - name: Configure kubectl (after cluster is ready)
        if: ${{ github.event.inputs.stage == 'all' }}
        run: |
          az aks get-credentials \
            --resource-group ${{ vars.AKS_RESOURCE_GROUP }} \
            --name           ${{ vars.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: "Terraform Init (Stage 2 infra)"
        if: ${{ github.event.inputs.stage == 'all' }}
        working-directory: terraform/aks/infra
        run: |
          terraform init \
            --backend-config="resource_group_name=ReliBank" \
            --backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            --backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            --backend-config="key=relibank/${{ github.event.inputs.environment }}/infra.tfstate" \
            --reconfigure --upgrade

      - name: "Terraform Apply (Stage 2 infra)"
        if: ${{ github.event.inputs.stage == 'all' }}
        working-directory: terraform/aks/infra
        run: |
          terraform apply \
            -var="demo_environment=${{ github.event.inputs.environment }}" \
            -var="aks_cluster_name=${{ vars.AKS_CLUSTER_NAME }}" \
            -var="aks_resource_group=${{ vars.AKS_RESOURCE_GROUP }}" \
            --auto-approve

      # ------------------------------------------------------------------
      # Stage 3 — AOAI account + model deployments
      # (Deployed AI flow is LangGraph chat-completions; no Assistants API
      # is used, so no assistant entities are created or referenced.)
      # ------------------------------------------------------------------
      - name: "Terraform Init (Stage 3 ai_services)"
        if: ${{ github.event.inputs.stage == 'all' || github.event.inputs.stage == 'ai_services' }}
        working-directory: terraform/aks/ai_services
        run: |
          terraform init \
            --backend-config="resource_group_name=ReliBank" \
            --backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            --backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            --backend-config="key=relibank/${{ github.event.inputs.environment }}/ai_services.tfstate" \
            --reconfigure --upgrade

      # Defensive: Azure soft-deletes Cognitive Services accounts on destroy with a 48h
      # retention window. If a prior destroy was interrupted or TF state diverged, the
      # name is reserved in the recycle bin and `terraform apply` 409s on create.
      # Idempotent: no-op when nothing's in the recycle bin.
      - name: "Pre-apply: purge any soft-deleted AOAI account"
        if: ${{ github.event.inputs.stage == 'all' || github.event.inputs.stage == 'ai_services' }}
        run: |
          AOAI_NAME="relibank-${{ github.event.inputs.environment }}-openai"
          LOCATION="${{ vars.AZURE_LOCATION }}"
          RG="${{ vars.AKS_RESOURCE_GROUP }}"
          if az cognitiveservices account list-deleted --query "[?name=='${AOAI_NAME}'] | [0].name" -o tsv | grep -q .; then
            echo "Found orphan in recycle bin — purging ${AOAI_NAME}"
            az cognitiveservices account purge --location "${LOCATION}" --resource-group "${RG}" --name "${AOAI_NAME}"
            echo "Purged."
          else
            echo "No orphan in recycle bin — nothing to purge."
          fi

      - name: "Terraform Apply (Stage 3 ai_services)"
        if: ${{ github.event.inputs.stage == 'all' || github.event.inputs.stage == 'ai_services' }}
        working-directory: terraform/aks/ai_services
        run: |
          terraform apply \
            -var="demo_environment=${{ github.event.inputs.environment }}" \
            -var="location=${{ vars.AZURE_LOCATION }}" \
            -var="aks_resource_group=${{ vars.AKS_RESOURCE_GROUP }}" \
            --auto-approve

      # ------------------------------------------------------------------
      # Stage 4 — notifications Function App + ACS + email service.
      # Function code publishes here too (env-scoped resource: blue + green
      # share the same Function URL, so code-publish must NOT be in the
      # per-color deploy workflow — see plan rationale).
      # ------------------------------------------------------------------
      - name: "Terraform Init (Stage 4 notifications)"
        if: ${{ github.event.inputs.stage == 'all' || github.event.inputs.stage == 'notifications' }}
        working-directory: terraform/aks/notifications
        run: |
          terraform init \
            --backend-config="resource_group_name=ReliBank" \
            --backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            --backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            --backend-config="key=relibank/${{ github.event.inputs.environment }}/notifications.tfstate" \
            --reconfigure --upgrade

      - name: "Terraform Apply (Stage 4 notifications)"
        if: ${{ github.event.inputs.stage == 'all' || github.event.inputs.stage == 'notifications' }}
        working-directory: terraform/aks/notifications
        run: |
          terraform apply \
            -var="demo_environment=${{ github.event.inputs.environment }}" \
            -var="location=${{ vars.AZURE_LOCATION }}" \
            -var="aks_resource_group=${{ vars.AKS_RESOURCE_GROUP }}" \
            -var="sms_sender_phone=${{ secrets.AZURE_ACS_SMS_PHONE_NUMBER }}" \
            -var="sms_throttle_percentage=${{ vars.SMS_THROTTLE_PERCENTAGE || 5 }}" \
            --auto-approve

      - name: Install Azure Functions Core Tools
        if: ${{ github.event.inputs.stage == 'all' || github.event.inputs.stage == 'notifications' }}
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      # `func azure functionapp publish` is racy against fresh Function App
      # creation — first attempt often fails with "Sequence contains no
      # elements" while site settings finish propagating. Retry up to 3 times
      # with 30s backoff before giving up.
      - name: Publish Notifications Function code
        if: ${{ github.event.inputs.stage == 'all' || github.event.inputs.stage == 'notifications' }}
        working-directory: notifications_service/azure_function
        run: |
          set -e
          for i in 1 2 3; do
            echo "Publish attempt $i..."
            if func azure functionapp publish relibank-${{ github.event.inputs.environment }}-notifications-fn --python; then
              echo "Publish succeeded on attempt $i."
              exit 0
            fi
            if [ "$i" -lt 3 ]; then
              echo "Attempt $i failed; sleeping 30s before retry..."
              sleep 30
            fi
          done
          echo "All 3 publish attempts failed."
          exit 1

      - name: Deployment Summary
        run: |
          echo "========================================"
          echo "INFRA DEPLOY COMPLETE"
          echo "========================================"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Cluster:     ${{ vars.AKS_CLUSTER_NAME }}"
          echo "ACR:         ${{ vars.ACR_SERVER }}"
          NGINX_IP=$(kubectl get svc ingress-nginx-controller -n ingress-nginx \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "<pending>")
          echo "NGINX IP:    $NGINX_IP"
          echo ""
          echo "Next, run 'Deploy ReliBank' workflow with environment=${{ github.event.inputs.environment }} target_color=blue"

  # ---------------------------------------------------------------------------
  # Destroy — reverse order (infra first, then cluster)
  # ---------------------------------------------------------------------------
  relibank-infra-destroy:
    name: Destroy ReliBank Infra
    if: ${{ github.event.inputs.action_type == 'destroy' && needs.pre-destroy-checks.outputs.safe_to_destroy == 'true' }}
    needs: [pre-destroy-checks]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ github.event.inputs.environment }}
    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure kubectl
        run: |
          az aks get-credentials \
            --resource-group ${{ vars.AKS_RESOURCE_GROUP }} \
            --name           ${{ vars.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5

      # Stage 4 first — notifications (Function App + ACS + email service)
      - name: "Terraform Init (Stage 4 notifications)"
        working-directory: terraform/aks/notifications
        run: |
          terraform init \
            --backend-config="resource_group_name=ReliBank" \
            --backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            --backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            --backend-config="key=relibank/${{ github.event.inputs.environment }}/notifications.tfstate" \
            --reconfigure --upgrade

      - name: "Terraform Destroy (Stage 4 notifications)"
        working-directory: terraform/aks/notifications
        run: |
          terraform destroy \
            -var="demo_environment=${{ github.event.inputs.environment }}" \
            -var="location=${{ vars.AZURE_LOCATION }}" \
            -var="aks_resource_group=${{ vars.AKS_RESOURCE_GROUP }}" \
            -var="sms_sender_phone=${{ secrets.AZURE_ACS_SMS_PHONE_NUMBER }}" \
            -var="sms_throttle_percentage=${{ vars.SMS_THROTTLE_PERCENTAGE || 5 }}" \
            --auto-approve

      # Stage 3 — ai_services (AOAI account + model deployments)
      - name: "Terraform Init (Stage 3 ai_services)"
        working-directory: terraform/aks/ai_services
        run: |
          terraform init \
            --backend-config="resource_group_name=ReliBank" \
            --backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            --backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            --backend-config="key=relibank/${{ github.event.inputs.environment }}/ai_services.tfstate" \
            --reconfigure --upgrade

      - name: "Terraform Destroy (Stage 3 ai_services)"
        working-directory: terraform/aks/ai_services
        run: |
          terraform destroy \
            -var="demo_environment=${{ github.event.inputs.environment }}" \
            -var="location=${{ vars.AZURE_LOCATION }}" \
            -var="aks_resource_group=${{ vars.AKS_RESOURCE_GROUP }}" \
            --auto-approve

      # Stage 2 — cluster-wide infra
      #
      # Pre-Stage-2 cleanup. Chaos-mesh CRs (StressChaos, PodChaos, etc.) carry
      # a `chaos-mesh/records` finalizer that only the chaos-mesh controller can
      # clear. If the helm_release.chaos_mesh resource is destroyed before its
      # CRs are gone, the controller disappears, the finalizers stick, and the
      # `relibank` namespace deletion hangs (TF eventually times out with
      # "context deadline exceeded"). Delete CRs while the controller is still
      # running, then force-clear any stragglers.
      - name: "Pre Stage 2 destroy — clean chaos-mesh CRs"
        run: |
          set +e
          kinds=$(kubectl api-resources --api-group=chaos-mesh.org -o name 2>/dev/null | tr '\n' ' ')
          if [ -z "$kinds" ]; then
            echo "No chaos-mesh CRDs registered, nothing to clean."
            exit 0
          fi
          echo "chaos-mesh resource kinds: $kinds"

          for kind in $kinds; do
            kubectl delete "$kind" -A --all --wait=false --ignore-not-found 2>&1 | tail -1
          done

          for i in $(seq 1 6); do
            remaining=0
            for kind in $kinds; do
              n=$(kubectl get "$kind" -A --no-headers --ignore-not-found 2>/dev/null | wc -l | tr -d ' ')
              remaining=$((remaining + n))
            done
            if [ "$remaining" -eq 0 ]; then
              echo "All chaos-mesh CRs cleared."
              exit 0
            fi
            echo "Still $remaining chaos-mesh CR(s) waiting on finalizers..."
            sleep 5
          done

          echo "Force-clearing residual chaos-mesh finalizers..."
          for kind in $kinds; do
            kubectl get "$kind" -A --no-headers --ignore-not-found -o custom-columns="NS:.metadata.namespace,NAME:.metadata.name" 2>/dev/null \
              | while read ns name; do
                  [ -z "$name" ] && continue
                  echo "  patch $kind/$name in $ns"
                  kubectl patch "$kind" "$name" -n "$ns" --type=merge -p '{"metadata":{"finalizers":[]}}' 2>&1 | tail -1
                done
          done
          exit 0

      - name: "Terraform Init (Stage 2 infra)"
        working-directory: terraform/aks/infra
        run: |
          terraform init \
            --backend-config="resource_group_name=ReliBank" \
            --backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            --backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            --backend-config="key=relibank/${{ github.event.inputs.environment }}/infra.tfstate" \
            --reconfigure --upgrade

      - name: "Terraform Destroy (Stage 2 infra)"
        working-directory: terraform/aks/infra
        run: |
          terraform destroy \
            -var="demo_environment=${{ github.event.inputs.environment }}" \
            -var="aks_cluster_name=${{ vars.AKS_CLUSTER_NAME }}" \
            -var="aks_resource_group=${{ vars.AKS_RESOURCE_GROUP }}" \
            --auto-approve

      # Stage 1 last — AKS cluster
      - name: "Terraform Init (Stage 1 cluster)"
        working-directory: terraform/aks/cluster
        run: |
          terraform init \
            --backend-config="resource_group_name=ReliBank" \
            --backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            --backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            --backend-config="key=relibank/${{ github.event.inputs.environment }}/cluster.tfstate" \
            --reconfigure --upgrade

      - name: "Terraform Destroy (Stage 1 cluster)"
        working-directory: terraform/aks/cluster
        run: |
          terraform destroy \
            -var="demo_environment=${{ github.event.inputs.environment }}" \
            -var="aks_cluster_name=${{ vars.AKS_CLUSTER_NAME }}" \
            -var="resource_group_name=${{ vars.AKS_RESOURCE_GROUP }}" \
            -var="acr_name=${{ vars.ACR_NAME }}" \
            -var="location=${{ vars.AZURE_LOCATION }}" \
            --auto-approve
