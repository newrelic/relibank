name: Build & Push Container Images

on:
  workflow_call:
    inputs:
      target_color:
        description: "Deployment color tag to apply to images (blue or green)"
        type: string
        required: true
      environment:
        description: "GitHub environment to use for ACR vars (sandbox, staging, prod)"
        type: string
        required: false
        default: "events"
      force_rebuild:
        description: "Force a complete rebuild (no cache)"
        type: boolean
        required: false
        default: false
      agent:
        description: "Agent to deploy"
        type: string
        required: false
        default: "newrelic"
      new_relic_region:
        description: "New Relic region"
        type: string
        required: false
        default: "US"

  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to AKS after build/push'
        required: false
        type: boolean
        default: false
      skip_build:
        description: 'Skip build/push steps (only apply kustomize overlay)'
        required: false
        type: boolean
        default: false
      target_color:
        description: "Deployment color tag to apply to images (blue or green)"
        required: false
        type: string
        default: ""
      environment:
        description: "GitHub environment to use for ACR vars"
        type: choice
        required: false
        default: "events"
        options:
          - events
          - sandbox
          - staging
          - prod
      force_rebuild:
        description: "Force a complete rebuild (no cache)"
        type: boolean
        required: false
        default: false
      agent:
        description: "Select agent to deploy"
        type: choice
        required: false
        default: "newrelic"
        options:
          - newrelic
          - otel
      new_relic_region:
        description: "Select New Relic region"
        type: choice
        required: false
        default: "US"
        options:
          - "US"

  push:
    branches:
      - main

# ---------------------------------------------------------------------------
# Shared env vars resolved once at the top level
# ---------------------------------------------------------------------------
env:
  ACR_NAME:   ${{ vars.ACR_NAME   || 'relibank' }}
  ACR_SERVER: ${{ vars.ACR_SERVER || 'relibank.azurecr.io' }}
  APP_NAME:   ${{ vars.APP_NAME }}
  NR_ACCOUNT_ID: ${{ vars.NR_ACCOUNT_ID }}

jobs:

  # ---------------------------------------------------------------------------
  # Build and push — one parallel job per service (mirrors image-deploy.yml)
  # ---------------------------------------------------------------------------
  build-and-push-image:
    name: ${{ matrix.images.image_name }} - Build and Push
    if: ${{ inputs.skip_build != true }}
    environment: ${{ inputs.environment || 'events' }}
    strategy:
      fail-fast: false
      matrix:
        images:
          # build_context : Docker build context (passed to `docker build`)
          # hash_dir      : Directory to hash for cache key (service source dir)
          # dockerfile    : Explicit Dockerfile path when not at build_context root (empty = omit flag)

          - image_name:    frontend-service
            build_context: ./frontend_service
            hash_dir:      ./frontend_service
            dockerfile:    ""

          - image_name:    accounts-service
            build_context: .
            hash_dir:      ./accounts_service
            dockerfile:    ./accounts_service/Dockerfile

          - image_name:    auth-service
            build_context: .
            hash_dir:      ./auth_service
            dockerfile:    ./auth_service/Dockerfile

          - image_name:    transaction-service
            build_context: .
            hash_dir:      ./transaction_service
            dockerfile:    ./transaction_service/Dockerfile

          - image_name:    bill-pay-service
            build_context: .
            hash_dir:      ./bill_pay
            dockerfile:    ./bill_pay/Dockerfile

          - image_name:    notifications-service
            build_context: ./notifications_service
            hash_dir:      ./notifications_service
            dockerfile:    ""

          - image_name:    scheduler-service
            build_context: ./scheduler_service
            hash_dir:      ./scheduler_service
            dockerfile:    ""

          - image_name:    support-service
            build_context: .
            hash_dir:      ./support_service
            dockerfile:    ./support_service/Dockerfile

          - image_name:    risk-assessment-service
            build_context: .
            hash_dir:      ./risk_assessment_service
            dockerfile:    ./risk_assessment_service/Dockerfile

          - image_name:    scenario-runner
            build_context: ./scenario_service
            hash_dir:      ./scenario_service
            dockerfile:    ""

          - image_name:    mssql-custom
            build_context: ./transaction_service/mssql
            hash_dir:      ./transaction_service/mssql
            dockerfile:    ""

          - image_name:    postgres-custom
            build_context: ./accounts_service/postgres
            hash_dir:      ./accounts_service/postgres
            dockerfile:    ""

          - image_name:    kafka-with-monitoring
            build_context: ./kafka_service
            hash_dir:      ./kafka_service
            dockerfile:    ""

          - image_name:    otel-collector-kafka
            build_context: .
            hash_dir:      ./otel_collector_kafka
            dockerfile:    ./otel_collector_kafka/Dockerfile

          - image_name:    nrdot-collector-mssql
            build_context: ./otel_collector_mssql
            hash_dir:      ./otel_collector_mssql
            dockerfile:    ""

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Validate APP_NAME
        run: |
          if [ -z "${{ vars.APP_NAME }}" ]; then
            echo "ERROR: APP_NAME is not set. Add APP_NAME to the GitHub environment variables."
            exit 1
          fi
          echo "APP_NAME=${{ vars.APP_NAME }} verified"

      - name: Build and Push ${{ matrix.images.image_name }}
        env:
          FORCE_REBUILD:           ${{ inputs.force_rebuild }}
          TARGET_COLOR:            ${{ inputs.target_color }}
          ACR_SERVER:              ${{ env.ACR_SERVER }}
          NEW_RELIC_USER_API_KEY:  ${{ secrets.NR_USER_API_KEY }}
          NEW_RELIC_LICENSE_KEY:   ${{ secrets.NR_LICENSE_KEY }}
          NEW_RELIC_ACCOUNT_ID:    ${{ vars.NR_ACCOUNT_ID }}
          AGENT_TYPE:              ${{ inputs.agent || 'newrelic' }}
          NEW_RELIC_REGION:        ${{ inputs.new_relic_region || 'US' }}
          APP_NAME:                ${{ vars.APP_NAME }}
        run: |
          SCRIPT_DIR="${{ github.workspace }}/scripts/image_build"
          BUILD_CONTEXT="${{ github.workspace }}/${{ matrix.images.build_context }}"
          HASH_DIR="${{ github.workspace }}/${{ matrix.images.hash_dir }}"

          DOCKERFILE_ARG=""
          if [ -n "${{ matrix.images.dockerfile }}" ]; then
            DOCKERFILE_ARG="--dockerfile ${{ github.workspace }}/${{ matrix.images.dockerfile }}"
          fi

          FORCE_ARG=""
          if [ "$FORCE_REBUILD" == "true" ]; then
            FORCE_ARG="--force-rebuild"
          fi

          python "$SCRIPT_DIR/build_images.py" \
            --build-context  "$BUILD_CONTEXT" \
            --hash-dir       "$HASH_DIR" \
            --service        "${{ matrix.images.image_name }}" \
            --target-color   "$TARGET_COLOR" \
            --acr-server     "$ACR_SERVER" \
            --nr-user-key    "$NEW_RELIC_USER_API_KEY" \
            --nr-license-key "$NEW_RELIC_LICENSE_KEY" \
            --nr-account-id  "$NEW_RELIC_ACCOUNT_ID" \
            --agent-type     "$AGENT_TYPE" \
            --nr-region      "$NEW_RELIC_REGION" \
            --app-name       "$APP_NAME" \
            $DOCKERFILE_ARG \
            $FORCE_ARG

  # ---------------------------------------------------------------------------
  # Deploy to AKS (non-blue-green path: workflow_dispatch with deploy=true)
  # ---------------------------------------------------------------------------
  deploy-to-aks:
    needs: [build-and-push-image]
    if: ${{ always() && (inputs.deploy == true || inputs.deploy == 'true' || inputs.skip_build == true) }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'events' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure kubectl context
        run: |
          az aks get-credentials \
            --resource-group ${{ vars.AKS_RESOURCE_GROUP || 'ReliBank' }} \
            --name ${{ vars.AKS_CLUSTER_NAME || 'relibank-prod' }} \
            --overwrite-existing

      - name: Delete existing immutable Jobs
        run: |
          kubectl delete job postgres-init -n relibank --ignore-not-found=true
          kubectl delete job mssql-init    -n relibank --ignore-not-found=true

      - name: Apply kustomize overlay
        run: |
          kubectl apply -k k8s/overlays/azure-prod

      - name: Wait for database init jobs
        run: |
          kubectl wait --for=condition=complete --timeout=5m job/postgres-init -n relibank \
            || echo "postgres-init did not complete"
          kubectl wait --for=condition=complete --timeout=5m job/mssql-init    -n relibank \
            || echo "mssql-init did not complete"

      - name: Restart services
        run: |
          kubectl rollout restart deployment -n relibank --selector='app notin (accounts-db)'
          kubectl delete pod -n relibank -l app=accounts-db --force --grace-period=0 || true
          sleep 5
          kubectl rollout restart deployment accounts-db -n relibank
          kubectl rollout restart statefulset  -n relibank

          kubectl rollout status deployment -n relibank --timeout=5m
          kubectl rollout status statefulset -n relibank --timeout=5m

      - name: Install Chaos Mesh
        run: |
          helm repo add chaos-mesh https://charts.chaos-mesh.org
          helm repo update
          helm upgrade --install chaos-mesh chaos-mesh/chaos-mesh \
            --namespace chaos-mesh \
            --create-namespace \
            --version 2.6.2 \
            -f scenario_service/chaos_mesh/values.yaml \
            --wait

      - name: Configure Chaos Experiments
        run: |
          kubectl label namespace relibank chaos-mesh.org/inject=enabled --overwrite
          kubectl apply -f scenario_service/chaos_mesh/experiments/relibank-pod-chaos-adhoc.yaml
          kubectl apply -f scenario_service/chaos_mesh/experiments/relibank-stress-scenarios.yaml

      - name: Install New Relic Observability Stack
        run: |
          helm repo add newrelic https://helm-charts.newrelic.com
          helm repo update
          helm upgrade --install nri-bundle newrelic/nri-bundle \
            --namespace newrelic \
            --create-namespace \
            --version 6.0.45 \
            -f k8s/newrelic/values.yaml \
            --set global.licenseKey="${{ secrets.NR_LICENSE_KEY }}" \
            --set global.cluster="${{ vars.AKS_CLUSTER_NAME || 'relibank-prod' }}" \
            --set global.lowDataMode=false \
            --set newrelic-infrastructure.enabled=true \
            --set newrelic-infrastructure.privileged=true \
            --set nri-prometheus.enabled=true \
            --set nri-metadata-injection.enabled=true \
            --set newrelic-logging.enabled=true \
            --set ksm.enabled=true \
            --set controlPlane.enabled=true \
            --set nri-kube-events.enabled=true \
            --set nr-ebpf-agent.enabled=true \
            --set nr-ebpf-agent.apmDataReporting=true \
            --set nr-ebpf-agent.networkMetricsReporting=true \
            --set pixie.enabled=false \
            --set newrelic-pixie.enabled=false \
            --wait

      - name: Deployment Summary
        run: |
          echo "========================================"
          echo "DEPLOY COMPLETE"
          echo "========================================"
          echo "Cluster: ${{ vars.AKS_CLUSTER_NAME || 'relibank-prod' }}"
          echo "ACR:     ${{ env.ACR_SERVER }}"
