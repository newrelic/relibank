name: ReliBank NR

run-name: ${{ inputs.action_type }} ReliBank NR entities in ${{ inputs.environment }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      action_type:
        description: "deploy | destroy"
        type: choice
        required: true
        default: "deploy"
        options:
          - deploy
          - destroy
      environment:
        description: "Select environment"
        type: choice
        required: true
        default: "sandbox"
        options:
          - sandbox
          - staging
          - prod
          - analysts

jobs:

  # ---------------------------------------------------------------------------
  # Deploy — apply the NR entity TF module against the env's NR account.
  #
  # Ordering note: this workflow REQUIRES that the app tier has been deployed at
  # least once (so that APM entities exist in NR and the data sources in
  # nr_entities.tf can resolve). See docs/deployer/runbook.md for the layer order:
  #   relibank-infra.yml (env-scoped infra)
  #   -> deploy-relibank.yml (color-scoped app)
  #   -> relibank-newrelic.yml (env-scoped NR entities)
  # ---------------------------------------------------------------------------
  relibank-newrelic-deploy:
    name: Deploy ReliBank NR entities
    if: ${{ github.event.inputs.action_type == 'deploy' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event.inputs.environment }}
    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5

      - name: "Terraform Init"
        working-directory: terraform/aks/newrelic
        run: |
          terraform init \
            --backend-config="resource_group_name=ReliBank" \
            --backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            --backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            --backend-config="key=relibank/${{ github.event.inputs.environment }}/newrelic.tfstate" \
            --reconfigure --upgrade

      - name: "Terraform Apply"
        working-directory: terraform/aks/newrelic
        run: |
          terraform apply \
            -var="new_relic_account_id=${{ vars.NR_ACCOUNT_ID }}" \
            -var="new_relic_user_api_key=${{ secrets.NR_USER_API_KEY }}" \
            -var="new_relic_license_key=${{ secrets.NR_LICENSE_KEY }}" \
            -var="new_relic_region=${{ vars.NR_REGION || 'US' }}" \
            -var="demo_environment=${{ github.event.inputs.environment }}" \
            -var="app_name=${{ vars.APP_NAME }}" \
            -var="aks_cluster_name=${{ vars.AKS_CLUSTER_NAME }}" \
            -var="aks_resource_group=${{ vars.AKS_RESOURCE_GROUP }}" \
            --auto-approve

  # ---------------------------------------------------------------------------
  # Validate — post-apply, confirm each NR entity is queryable from the API
  # user's perspective AND that the helm-installed cluster agents are reporting
  # telemetry. Mirrors demogorgon's post-deployment-validation.yml validate-data
  # job: pytest + NerdGraph, `continue-on-error: true` step + result-check step
  # so per-test failures are visible but the overall job still fails as a hard
  # gate.
  # ---------------------------------------------------------------------------
  relibank-newrelic-validate:
    name: Validate ReliBank NR entities + telemetry
    if: ${{ github.event.inputs.action_type == 'deploy' }}
    needs: relibank-newrelic-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pytest requests

      - name: Wait for entity propagation
        run: |
          echo "Waiting 120s for NR entity propagation + agent first-report..."
          sleep 120

      - name: Run NR validation
        id: nr-validate
        continue-on-error: true
        env:
          NR_USER_API_KEY:  ${{ secrets.NR_USER_API_KEY }}
          NR_ACCOUNT_ID:    ${{ vars.NR_ACCOUNT_ID }}
          APP_NAME:         ${{ vars.APP_NAME }}
          AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
        run: |
          python3 -m pytest -v tests/workflow_validation/validate_nr_workflow.py --tb=short --no-header

      - name: Check validation result
        if: always()
        run: |
          if [ "${{ steps.nr-validate.outcome }}" != "success" ]; then
            echo "::error::NR entity/telemetry validation failed"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Destroy — tear down all entities managed by this module.
  # Run BEFORE `Deploy ReliBank destroy` for cleanliness (data sources will go
  # stale once the app tier is destroyed and services stop reporting).
  # ---------------------------------------------------------------------------
  relibank-newrelic-destroy:
    name: Destroy ReliBank NR entities
    if: ${{ github.event.inputs.action_type == 'destroy' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event.inputs.environment }}
    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5

      - name: "Terraform Init"
        working-directory: terraform/aks/newrelic
        run: |
          terraform init \
            --backend-config="resource_group_name=ReliBank" \
            --backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            --backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            --backend-config="key=relibank/${{ github.event.inputs.environment }}/newrelic.tfstate" \
            --reconfigure --upgrade

      - name: "Terraform Destroy"
        working-directory: terraform/aks/newrelic
        run: |
          terraform destroy \
            -var="new_relic_account_id=${{ vars.NR_ACCOUNT_ID }}" \
            -var="new_relic_user_api_key=${{ secrets.NR_USER_API_KEY }}" \
            -var="new_relic_license_key=${{ secrets.NR_LICENSE_KEY }}" \
            -var="new_relic_region=${{ vars.NR_REGION || 'US' }}" \
            -var="demo_environment=${{ github.event.inputs.environment }}" \
            -var="app_name=${{ vars.APP_NAME }}" \
            -var="aks_cluster_name=${{ vars.AKS_CLUSTER_NAME }}" \
            -var="aks_resource_group=${{ vars.AKS_RESOURCE_GROUP }}" \
            --auto-approve
