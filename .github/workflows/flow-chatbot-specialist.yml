name: Flow - Support Specialist Delay

run-name: Support Specialist Delay demo scenario kickoff

on:
  workflow_dispatch:
    # inputs:
    #   duration:
    #     description: "Scenario duration in minutes"
    #     type: choice
    #     required: true
    #     default: "30"
    #     options:
    #      - "5"
    #      - "10"
    #      - "15"
    #      - "30"

  # schedule:
  # # Run every 6 hours
  # - cron: "0 */6 * * *"



jobs:

  support-specialist-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        # environment: [sandbox, staging, prod]
        environment: [events]

    environment: ${{ matrix.environment }}

# --------------- runner setup ---------------
    steps:
      - name: Record start time
        id: start-time
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Checkout repo
        uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: pip installs
        run: |
          pip install requests

# --------------- demo flow ---------------
      - name: Send deployment marker (coordinator update)
        run: |
          python utils/scripts/new_relic/send_change_tracking_marker.py \
            --api-key ${{ secrets.NR_USER_API_KEY }} \
            --account-id ${{ vars.NR_ACCOUNT_ID }} \
            --app-name "Support Service" \
            --entity-domain APM \
            --category DEPLOYMENT \
            --type ROLLING \
            --version v2.1.0 \
            --user devops_automation \
            --short-description "Coordinator agent update" \
            --description "Deploying updated coordinator agent - optimizing specialist delegation" \
            --group-id SUPPORT-SPEC-2024 \
            --custom-attribute environment=production

      - name: Generate specialist request load for 60 minutes (triggers 8s delay)
        run: |
          cd demo_flows/support_specialist/
          # Run for 60 minutes with randomized delays between 10-30 seconds
          # Each request will trigger the specialist agent with ASSISTANT_B_DELAY_SECONDS=8

          echo "Starting 60-minute load generation with random delays (10-30s between requests)..."
          START_TIME=$(date +%s)
          END_TIME=$((START_TIME + 3600))
          REQUEST_COUNT=0

          while [ $(date +%s) -lt $END_TIME ]; do
            REQUEST_COUNT=$((REQUEST_COUNT + 1))
            ELAPSED=$(($(date +%s) - START_TIME))

            echo "[$ELAPSED s] Sending specialist request #$REQUEST_COUNT"
            python support_specialist_loadgen.py ${{ vars.BASE_URL }}/support-service/chat --count 1 &

            # Random delay between 10 and 30 seconds
            DELAY=$((10 + RANDOM % 21))
            echo "Waiting ${DELAY}s before next request..."
            sleep $DELAY
          done

          echo "Load generation complete. Sent $REQUEST_COUNT specialist requests over 60 minutes."
          echo "Waiting for final requests to complete..."
          wait

      # - name: Send rollback deployment marker
      #   if: always()
      #   run: |
      #     cd demo_flows/support_specialist/ && python send_marker_support.py goodCommit ${{ secrets.NR_USER_API_KEY }} ${{ vars.NR_ACCOUNT_ID }} production

      - name: Report scenario status to Krenko's Calendar
        if: always()
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          APP_NAME="${GITHUB_REPOSITORY##*/}"
          SCENARIO_NAME="${GITHUB_WORKFLOW#Flow - }"
          STARTED_AT="${{ steps.start-time.outputs.timestamp }}"
          COMPLETED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          HOUR=$(date -u +%Y-%m-%d-%H)

          # Determine status based on job outcome
          if [ "${{ job.status }}" == "success" ]; then
            STATUS="completed"
          else
            STATUS="failed"
          fi

          cat > status.json <<EOF
          {
            "app": "$APP_NAME",
            "scenario": "$SCENARIO_NAME",
            "type": "scheduled",
            "status": "$STATUS",
            "started_at": "$STARTED_AT",
            "completed_at": "$COMPLETED_AT",
            "github_run_id": "${{ github.run_id }}",
            "github_run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

          aws s3 cp status.json "s3://goblin-swarm-status-${ACCOUNT_ID}/scenarios/${APP_NAME}/${SCENARIO_NAME}/${HOUR}.json" || true
