name: Flow - Bill Payment K8s Issue

run-name: Bill Payment K8s Issue demo scenario kickoff

on: 
  workflow_dispatch:
    # inputs:
    #   duration:
    #     description: "Scenario duration in minutes"
    #     type: choice
    #     required: true
    #     default: "30"
    #     options:
    #      - "5"
    #      - "10"
    #      - "15"
    #      - "30"
  
  schedule:
  # Run every 4 hours
  - cron: "0 */4 * * *"



jobs:

  get-metadata:
    name: Get Metadata
    runs-on: ubuntu-latest
    outputs:
      latest_tag: ${{ steps.get_latest_tag.outputs.tag }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

  k8s-bill-pay-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        # environment: [sandbox, staging, prod]
        environment: [events]

    environment: ${{ matrix.environment }}

# --------------- runner setup ---------------
    steps:
      - name: Record start time
        id: start-time
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Checkout repo
        uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: pip installs
        run: |
          pip install locust

# --------------- demo flow ---------------
      - name: Send bad deployment marker
        run: |
          python utils/scripts/new_relic/send_change_tracking_marker.py \
            --api-key ${{ secrets.NR_USER_API_KEY }} \
            --account-id ${{ vars.NR_ACCOUNT_ID }} \
            --app-name "Relibank - Bill Pay Service" \
            --entity-domain APM \
            --category DEPLOYMENT \
            --type ROLLING \
            --version v0.4.01 \
            --user admin_access_token \
            --short-description "Image deployment" \
            --description "Deploying new Bill Payment image" \
            --group-id NRDEMO-101423 \
            --custom-attribute environment=production

      - name: Reset chaos rate limit
        run: |
          echo "Resetting chaos rate limit to ensure scenario can be triggered..."
          curl -X POST "${{ vars.BASE_URL }}/scenario-runner/api/chaos-rate-limit-reset" || echo "Rate limit reset failed (may not be available)"

      - name: Trigger chaos
        run: |
          cd demo_flows/k8s_bill_pay/ && python trigger_chaos.py ${{ vars.BASE_URL }}

      - name: Wait for Chaos Effect (100sec gap)
        # This step forces a 2-minute pause after the chaos is triggered 
        # but before the "good" deployment marker is sent.
        run: |
            echo "Sleeping for 100 seconds to allow the chaos experiment to run..."
            sleep 100
            echo "Resuming workflow."

      - name: Send good deployment marker
        if: always()
        run: |
          python utils/scripts/new_relic/send_change_tracking_marker.py \
            --api-key ${{ secrets.NR_USER_API_KEY }} \
            --account-id ${{ vars.NR_ACCOUNT_ID }} \
            --app-name "Relibank - Bill Pay Service" \
            --entity-domain APM \
            --category DEPLOYMENT \
            --type BASIC \
            --version v0.4.02 \
            --user admin_access_token \
            --short-description "Manual rollback deployment" \
            --description "ARGOCD: Reverting previous deployment" \
            --group-id NRDEMO-101423 \
            --custom-attribute environment=production
          cd demo_flows/k8s_bill_pay/ && python send_marker_bill_pay.py goodCommit ${{ secrets.NR_USER_API_KEY }} ${{ vars.NR_ACCOUNT_ID }}

      - name: Report scenario status to Krenko's Calendar
        if: always()
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          APP_NAME="${GITHUB_REPOSITORY##*/}"
          SCENARIO_NAME="${GITHUB_WORKFLOW#Flow - }"
          STARTED_AT="${{ steps.start-time.outputs.timestamp }}"
          COMPLETED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          HOUR=$(date -u +%Y-%m-%d-%H)

          # Determine status based on job outcome
          if [ "${{ job.status }}" == "success" ]; then
            STATUS="completed"
          else
            STATUS="failed"
          fi

          cat > status.json <<EOF
          {
            "app": "$APP_NAME",
            "scenario": "$SCENARIO_NAME",
            "type": "scheduled",
            "status": "$STATUS",
            "started_at": "$STARTED_AT",
            "completed_at": "$COMPLETED_AT",
            "github_run_id": "${{ github.run_id }}",
            "github_run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

          aws s3 cp status.json "s3://goblin-swarm-status-${ACCOUNT_ID}/scenarios/${APP_NAME}/${SCENARIO_NAME}/${HOUR}.json" || true
